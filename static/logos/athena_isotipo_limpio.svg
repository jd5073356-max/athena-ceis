<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Símbolo de Athena aislado, sin texto: yelmo corintio de la diosa Atenea con abertura ocular en forma de búho, sobre una columna clásica. Mostrado en versión clara y oscura.</desc>

