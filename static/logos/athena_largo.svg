<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Marca Athena: símbolo geométrico inspirado en el yelmo de la diosa Atenea sobre una columna, con la palabra ATHENA, un subtítulo descriptivo y la firma Código Beta al pie, mostrado en versión clara y oscura.</desc>

